{% extends "base.html" %}

{% block title %}Reset Password - Lung Cancer Classifier{% endblock %}

{% block content %}
<div class="login-container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-lock text-info" style="font-size: 3rem;"></i>
                        <h2 class="mt-3 text-primary">Reset Password</h2>
                        <p class="text-muted">Create a new secure password</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('reset_password') }}" id="resetForm">
                        <div class="mb-3">
                            <label for="new_password" class="form-label">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-key"></i>
                                </span>
                                <input type="password" class="form-control" id="new_password" name="new_password" 
                                       placeholder="Enter new password" required minlength="6">
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword1">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="form-text">
                                <i class="fas fa-info-circle me-1"></i>
                                Password must be at least 6 characters long
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-check"></i>
                                </span>
                                <input type="password" class="form-control" id="confirm_password" name="confirm_password" 
                                       placeholder="Confirm new password" required minlength="6">
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword2">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div id="passwordMatch" class="form-text"></div>
                        </div>
                        
                        <!-- Password Strength Indicator -->
                        <div class="mb-3">
                            <div class="password-strength">
                                <div class="strength-meter">
                                    <div id="strengthBar" class="strength-bar"></div>
                                </div>
                                <small id="strengthText" class="form-text">Password strength: <span id="strengthLevel">Weak</span></small>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-info w-100 py-2" id="resetBtn" disabled>
                            <i class="fas fa-save me-2"></i>Reset Password
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <a href="{{ url_for('index') }}" class="text-decoration-none">
                            <i class="fas fa-arrow-left me-1"></i>Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.password-strength {
    margin-bottom: 1rem;
}

.strength-meter {
    height: 8px;
    background-color: #e9ecef;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 0.5rem;
}

.strength-bar {
    height: 100%;
    width: 0%;
    transition: all 0.3s ease;
    border-radius: 4px;
}

.strength-weak { background-color: #dc3545; width: 25%; }
.strength-fair { background-color: #fd7e14; width: 50%; }
.strength-good { background-color: #ffc107; width: 75%; }
.strength-strong { background-color: #28a745; width: 100%; }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const newPasswordInput = document.getElementById('new_password');
    const confirmPasswordInput = document.getElementById('confirm_password');
    const passwordMatchDiv = document.getElementById('passwordMatch');
    const resetBtn = document.getElementById('resetBtn');
    const strengthBar = document.getElementById('strengthBar');
    const strengthLevel = document.getElementById('strengthLevel');
    
    // Toggle password visibility
    document.getElementById('togglePassword1').addEventListener('click', function() {
        togglePasswordVisibility('new_password', this);
    });
    
    document.getElementById('togglePassword2').addEventListener('click', function() {
        togglePasswordVisibility('confirm_password', this);
    });
    
    function togglePasswordVisibility(inputId, button) {
        const input = document.getElementById(inputId);
        const icon = button.querySelector('i');
        
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
    
    // Password strength checker
    newPasswordInput.addEventListener('input', function() {
        const password = this.value;
        const strength = calculatePasswordStrength(password);
        updateStrengthIndicator(strength);
        validateForm();
    });
    
    // Password match checker
    confirmPasswordInput.addEventListener('input', validateForm);
    
    function calculatePasswordStrength(password) {
        let score = 0;
        
        if (password.length >= 6) score += 1;
        if (password.length >= 8) score += 1;
        if (/[a-z]/.test(password)) score += 1;
        if (/[A-Z]/.test(password)) score += 1;
        if (/[0-9]/.test(password)) score += 1;
        if (/[^A-Za-z0-9]/.test(password)) score += 1;
        
        return Math.min(score, 4);
    }
    
    function updateStrengthIndicator(strength) {
        const levels = ['weak', 'fair', 'good', 'strong'];
        const colors = ['#dc3545', '#fd7e14', '#ffc107', '#28a745'];
        const widths = [25, 50, 75, 100];
        
        if (strength === 0) {
            strengthBar.style.width = '0%';
            strengthLevel.textContent = 'Too short';
            strengthLevel.style.color = '#dc3545';
        } else {
            const level = Math.min(strength - 1, 3);
            strengthBar.style.width = widths[level] + '%';
            strengthBar.style.backgroundColor = colors[level];
            strengthLevel.textContent = levels[level].charAt(0).toUpperCase() + levels[level].slice(1);
            strengthLevel.style.color = colors[level];
        }
    }
    
    function validateForm() {
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        const strength = calculatePasswordStrength(newPassword);
        
        // Check password match
        if (confirmPassword && newPassword !== confirmPassword) {
            passwordMatchDiv.innerHTML = '<i class="fas fa-times text-danger me-1"></i>Passwords do not match';
            passwordMatchDiv.className = 'form-text text-danger';
            resetBtn.disabled = true;
        } else if (confirmPassword && newPassword === confirmPassword) {
            passwordMatchDiv.innerHTML = '<i class="fas fa-check text-success me-1"></i>Passwords match';
            passwordMatchDiv.className = 'form-text text-success';
        } else {
            passwordMatchDiv.innerHTML = '';
        }
        
        // Enable button only if passwords match and strength is adequate
        resetBtn.disabled = !(newPassword === confirmPassword && newPassword.length >= 6 && strength >= 2);
    }
    
    // Auto-focus on new password input
    newPasswordInput.focus();
});
</script>
{% endblock %}
